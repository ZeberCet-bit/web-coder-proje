<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Coder Proje</title>
    <style>
        :root { --bg-color: #121212; --surface-color: #1e1e1e; --primary-accent: #bb86fc; --secondary-accent: #03dac6; --text-main: #e0e0e0; --text-muted: #a0a0a0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .navbar { width: 100%; background-color: var(--surface-color); padding: 15px 0; display: flex; justify-content: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .nav-btn { text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; color: #121212; background-color: var(--primary-accent); cursor: pointer; border: none; }
        .btn-outline { background-color: transparent; border: 1px solid var(--primary-accent); color: var(--primary-accent); }
        .container { width: 90%; max-width: 700px; margin: 40px auto; background: var(--surface-color); padding: 30px; border-radius: 12px; text-align: center; }
        input { width: 70%; padding: 12px 15px; background-color: #2c2c2c; border: 1px solid #444; color: var(--text-main); border-radius: 6px; margin-right: 10px; }
        button { padding: 12px 25px; background-color: var(--secondary-accent); color: #121212; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #2a2a2a; margin: 10px 0; padding: 15px 20px; border-radius: 8px; border-left: 5px solid var(--secondary-accent); display: flex; justify-content: space-between; }
        .date { font-size: 0.85em; color: var(--text-muted); }
        #loginWarning { display: none; color: #ea4335; font-weight: bold; margin: 20px 0; padding: 15px; background: rgba(234, 67, 53, 0.1); border-radius: 8px; border: 1px solid #ea4335; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/kayit.html" target="_blank" class="nav-btn">Kayıt Ol</a>
        <a href="/giris.html" target="_blank" class="nav-btn btn-outline" id="loginBtn">Giriş Yap</a>
        <button onclick="logout()" class="nav-btn btn-outline" id="logoutBtn" style="display: none; color: #ea4335; border-color: #ea4335;">Çıkış Yap</button>
    </div>

    <div class="container">
        <h2>Web Coder Proje</h2>
        <p id="welcomeMsg" style="color: var(--text-muted);">Sistem şu an karanlık modda çalışıyor.</p>
        
        <!-- Giriş yapmayanlara gösterilecek uyarı -->
        <div id="loginWarning">Siteye veri eklemek için lütfen giriş yapınız.</div>

        <!-- Sadece giriş yapanların göreceği alan -->
        <div id="inputSection" style="display: none; justify-content: center; margin-top: 20px;">
            <input type="text" id="nameInput" placeholder="Bir veri girin..." autocomplete="off">
            <button onclick="saveData()">Ekle</button>
        </div>
        <p id="resultMessage" style="color: var(--secondary-accent); font-weight: bold; font-size: 14px; min-height: 20px;"></p>
        
        <hr style="border: 0; border-top: 1px solid #444; margin: 30px 0;">
        <h3 style="text-align: left;">Sistem Kayıtları</h3>
        <ul id="userList"></ul>
    </div>

    <script>
        window.onload = () => {
            fetchUsers();
            checkLoginStatus();
        };

        function checkLoginStatus() {
            // Tarayıcının hafızasına (localStorage) bakıyoruz
            const currentUser = localStorage.getItem('loggedInUser');
            
            if (currentUser) {
                document.getElementById('welcomeMsg').innerText = `Kütüphaneye hoş geldin, ${currentUser}`;
                document.getElementById('inputSection').style.display = 'flex';
                document.getElementById('loginWarning').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
            } else {
                document.getElementById('inputSection').style.display = 'none';
                document.getElementById('loginWarning').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('loggedInUser');
            window.location.reload();
        }

        async function saveData() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            const response = await fetch('/api/add-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const data = await response.json();
            document.getElementById('resultMessage').innerText = "✓ " + (data.message || data.error);
            document.getElementById('nameInput').value = '';
            fetchUsers();
            setTimeout(() => document.getElementById('resultMessage').innerText = '', 3000);
        }

        async function fetchUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            const list = document.getElementById('userList');
            list.innerHTML = ''; 
            users.forEach(user => {
                const date = new Date(user.created_at).toLocaleString('tr-TR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
                list.innerHTML += `<li><span><strong>${user.name}</strong></span> <span class="date">${date}</span></li>`;
            });
        }
    </script>
</body>
</html>
