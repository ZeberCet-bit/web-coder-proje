<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Véstis | Premium Dark Store</title>
    <style>
        :root { --bg-color: #0d0d0d; --surface-color: #1a1a1a; --primary-accent: #ff4757; --primary-hover: #ff6b81; --text-main: #f1f2f6; --text-muted: #a4b0be; --border-color: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        
        header { background-color: var(--surface-color); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8em; font-weight: bold; letter-spacing: 2px; } .logo span { color: var(--primary-accent); }
        .nav-controls { display: flex; gap: 15px; align-items: center; }
        
        button { cursor: pointer; padding: 10px 20px; border-radius: 6px; font-weight: bold; transition: 0.3s; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--text-main); color: var(--text-main); }
        .btn-outline:hover { background: var(--text-main); color: var(--bg-color); }
        .btn-accent { background: var(--primary-accent); color: white; }
        .btn-accent:hover { background: var(--primary-hover); }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        #adminPanel { background: #261214; padding: 25px; border-radius: 10px; margin-bottom: 30px; border-left: 5px solid var(--primary-accent); display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid var(--border-color); color: white; border-radius: 6px; box-sizing: border-box; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: var(--surface-color); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border-color); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .product-price { color: var(--primary-accent); font-size: 1.4em; font-weight: bold; margin: 15px 0; }

        /* Modallar (Açılır Pencereler) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--surface-color); padding: 40px; border-radius: 12px; width: 400px; max-height: 80vh; overflow-y: auto; text-align: center; border: 1px solid var(--border-color); position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: var(--text-muted); }
        .close-btn:hover { color: white; }
        
        .order-item { background: #2d2d2d; padding: 10px; margin-bottom: 10px; border-radius: 6px; text-align: left; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VÉS<span>TİS</span></div>
        <div class="nav-controls">
            <button id="profileBtn" class="btn-outline" style="display:none;" onclick="profiliGoster()">👤 Profilim</button>
            <button id="logoutBtn" class="btn-outline" style="display:none;" onclick="cikisYap()">Çıkış</button>
            <button id="loginBtn" class="btn-outline" onclick="openModal('loginModal')">Giriş Yap</button>
            <button id="registerBtn" class="btn-accent" onclick="openModal('registerModal')">Kayıt Ol</button>
            <button class="btn-accent" onclick="openModal('cartModal')">🛒 Sepet (<span id="cartCount">0</span>)</button>
        </div>
    </header>

    <div class="container">
        <div id="adminPanel">
            <h3 style="color: var(--primary-accent);">🛠️ Yönetici Paneli</h3>
            <input type="text" id="title" placeholder="Ürün Adı">
            <input type="number" id="price" placeholder="Fiyat (TL)">
            <textarea id="description" placeholder="Açıklama"></textarea>
            <input type="text" id="imageUrl" placeholder="Görsel Linki">
            <button class="btn-accent" style="width: 100%;" onclick="urunEkle()">Ürünü Vitrine Ekle</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Modallar -->
    <div id="loginModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('loginModal')">&times;</span><h2>Giriş Yap</h2><input type="text" id="loginUser" placeholder="Kullanıcı Adı"><input type="password" id="loginPass" placeholder="Şifre"><button class="btn-accent" style="width:100%" onclick="girisYap()">Giriş Yap</button></div></div>
    
    <div id="registerModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('registerModal')">&times;</span><h2>Kayıt Ol</h2><input type="text" id="regUser" placeholder="Kullanıcı Adı"><input type="password" id="regPass" placeholder="Şifre"><button class="btn-accent" style="width:100%" onclick="kayitOl()">Kayıt Ol</button></div></div>
    
    <!-- PROFİL MODALI -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('profileModal')">&times;</span>
            <h2 id="profileName">Profilim</h2>
            <h3 style="text-align: left; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">📦 Geçmiş Siparişlerim</h3>
            <div id="orderHistory">Yükleniyor...</div>
        </div>
    </div>

    <!-- SEPET MODALI -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('cartModal')">&times;</span>
            <h2>Sepetiniz</h2>
            <div id="cartItems" style="text-align: left; margin-bottom: 20px;">Sepetiniz boş.</div>
            <h3 style="text-align: right; color: var(--primary-accent);">Toplam: <span id="cartTotal">0</span> TL</h3>
            <button class="btn-accent" style="width:100%" onclick="siparisiTamamla()">💳 Güvenli Ödeme İle Tamamla</button>
        </div>
    </div>

    <script>
        let sepet = [];
        let sepetToplam = 0;

        document.addEventListener('DOMContentLoaded', () => { oturumKontrolu(); urunleriGetir(); });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // OTURUM
        async function kayitOl() {
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: regUser.value, password: regPass.value }) });
            alert((await res.json()).message || "Hata"); closeModal('registerModal');
        }
        async function girisYap() {
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: loginUser.value, password: loginPass.value }) });
            const data = await res.json();
            if(data.error) alert(data.error); else { localStorage.setItem('aktifKullanici', data.username); oturumKontrolu(); closeModal('loginModal'); }
        }
        function cikisYap() { localStorage.removeItem('aktifKullanici'); oturumKontrolu(); }
        function oturumKontrolu() {
            const user = localStorage.getItem('aktifKullanici');
            document.getElementById('loginBtn').style.display = user ? 'none' : 'inline-block';
            document.getElementById('registerBtn').style.display = user ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = user ? 'inline-block' : 'none';
            document.getElementById('profileBtn').style.display = user ? 'inline-block' : 'none';
            document.getElementById('adminPanel').style.display = user === 'KurucuAdmin' ? 'block' : 'none';
        }

        // ÜRÜNLER
        async function urunleriGetir() {
            const res = await fetch('/api/products'); const products = await res.json();
            const grid = document.getElementById('productGrid'); grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `<div class="product-card"><img src="${p.imageUrl}"><div style="font-size: 1.2em; font-weight:bold;">${p.title}</div><div class="product-price">${p.price} TL</div><button class="btn-outline" style="width:100%" onclick="sepeteEkle('${p.title}', ${p.price})">Sepete Ekle</button></div>`;
            });
        }
        async function urunEkle() {
            await fetch('/api/add-product', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: title.value, price: price.value, description: description.value, imageUrl: imageUrl.value }) });
            urunleriGetir(); alert("Ürün Eklendi!");
        }

        // SEPET VE SİPARİŞ
        function sepeteEkle(ad, fiyat) {
            sepet.push({ad, fiyat}); sepetToplam += fiyat;
            document.getElementById('cartCount').innerText = sepet.length;
            guncelleSepetEkrani();
        }
        function guncelleSepetEkrani() {
            const div = document.getElementById('cartItems');
            if(sepet.length === 0) { div.innerHTML = "Sepetiniz boş."; return; }
            div.innerHTML = sepet.map(item => `<div class="order-item">${item.ad} - <b>${item.fiyat} TL</b></div>`).join('');
            document.getElementById('cartTotal').innerText = sepetToplam;
        }
        
        async function siparisiTamamla() {
            const user = localStorage.getItem('aktifKullanici');
            if(!user) return alert("Sipariş vermek için lütfen önce giriş yapın!");
            if(sepet.length === 0) return alert("Sepetiniz boş!");

            const res = await fetch('/api/checkout', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, items: sepet, totalPrice: sepetToplam })
            });
            alert((await res.json()).message);
            sepet = []; sepetToplam = 0; document.getElementById('cartCount').innerText = 0;
            guncelleSepetEkrani(); closeModal('cartModal');
        }

        // PROFİL GEÇMİŞİ
        async function profiliGoster() {
            const user = localStorage.getItem('aktifKullanici');
            document.getElementById('profileName').innerText = user + " Profili";
            openModal('profileModal');
            
            const res = await fetch(`/api/orders/${user}`);
            const orders = await res.json();
            const div = document.getElementById('orderHistory');
            
            if(orders.length === 0) { div.innerHTML = "Henüz hiç siparişiniz yok."; return; }
            div.innerHTML = orders.map(o => `
                <div class="order-item">
                    <span style="color:var(--text-muted); font-size:0.8em;">${new Date(o.date).toLocaleDateString()}</span><br>
                    Tutar: <b style="color:var(--primary-accent)">${o.totalPrice} TL</b><br>
                    Durum: <span style="color:#2ecc71">${o.status}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
