<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Véstis - Dijital Mağaza</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Ürün Ekleme Paneli (Sizin İçin) */
        .admin-panel { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #e74c3c; }
        .admin-panel input, .admin-panel textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-add { background-color: #e74c3c; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add:hover { background-color: #c0392b; }

        /* Ürünlerin Sergilendiği Raflar */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .product-title { font-size: 1.2em; color: #34495e; margin: 10px 0; font-weight: bold;}
        .product-desc { font-size: 0.9em; color: #7f8c8d; height: 40px; overflow: hidden; }
        .product-price { color: #27ae60; font-size: 1.4em; font-weight: bold; margin: 15px 0; }
        .btn-buy { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s;}
        .btn-buy:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Véstis Profesyonel Vitrin</h1>

        <!-- Kurucu Yönetici İçin Ürün Ekleme Paneli -->
        <div class="admin-panel">
            <h3>🛠️ Yeni Ürün Ekle (Yönetici Paneli)</h3>
            <input type="text" id="title" placeholder="Ürün Adı (Örn: Siyah Tasarım Tişört)">
            <input type="number" id="price" placeholder="Fiyat (TL) (Örn: 450)">
            <textarea id="description" placeholder="Ürün Açıklaması"></textarea>
            <input type="text" id="imageUrl" placeholder="Görsel Linki (Boş bırakırsanız varsayılan görsel atanır)">
            <button class="btn-add" onclick="urunEkle()">Ürünü Vitrine Ekle</button>
        </div>

        <!-- Müşteriler İçin Ürün Sergisi -->
        <div class="product-grid" id="productGrid">
            <!-- Ürünler buraya veri tabanından otomatik gelecek -->
        </div>
    </div>

    <script>
        // Sayfa açılır açılmaz bulut hafızadaki (MongoDB) ürünleri getir
        document.addEventListener('DOMContentLoaded', urunleriGetir);

        async function urunleriGetir() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; 
                
                if(products.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #7f8c8d;">Henüz vitrinde ürün bulunmuyor. Yukarıdaki panelden ilk ürününüzü ekleyin!</p>';
                    return;
                }

                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.imageUrl}" alt="${product.title}">
                        <div class="product-title">${product.title}</div>
                        <div class="product-desc">${product.description}</div>
                        <div class="product-price">${product.price} TL</div>
                        <button class="btn-buy" onclick="sepeteEkle('${product.title}')">Sepete Ekle</button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Hata:', error);
            }
        }

        async function urunEkle() {
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const description = document.getElementById('description').value || 'Ürün açıklaması bulunmuyor.';
            const imageUrl = document.getElementById('imageUrl').value || 'https://via.placeholder.com/300x200?text=Vestis+Urun';

            if(!title || !price) {
                alert("Lütfen ürün adı ve fiyatını mutlaka girin!");
                return;
            }

            try {
                const response = await fetch('/api/add-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, price, description, imageUrl })
                });
                
                const data = await response.json();
                alert(data.message); // Başarı mesajını göster
                
                // Formu temizle ve ürünleri sayfayı yenilemeden ekrana yansıt
                document.getElementById('title').value = '';
                document.getElementById('price').value = '';
                document.getElementById('description').value = '';
                document.getElementById('imageUrl').value = '';
                urunleriGetir();

            } catch (error) {
                alert("Ürün eklenirken bir hata oluştu.");
            }
        }

        function sepeteEkle(urunAdi) {
            alert("Harika! " + urunAdi + " sepete eklendi. (Sepet özellikleri bir sonraki aşamada inşa edilecek)");
        }
    </script>
</body>
</html>
